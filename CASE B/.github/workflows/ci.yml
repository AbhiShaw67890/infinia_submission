name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Test ───────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run linting
        run: flake8 app/ tests/ --max-line-length=120 --exclude=__pycache__

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── Build Docker Image ────────────────────────────────────
  build:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t task-management-api:${{ github.sha }} .

      - name: Verify image was built
        run: docker images task-management-api:${{ github.sha }}

  # ── Deploy to Render ──────────────────────────────────────
  deploy:
    name: Deploy to Render
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            --fail \
            --silent \
            --show-error
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Deployment triggered
        run: echo "✅ Deployment triggered successfully on Render"
