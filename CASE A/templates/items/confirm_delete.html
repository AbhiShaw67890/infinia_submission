{% extends 'base.html' %}
{% block title %}Delete Item — FindIt{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-16 text-center animate-slide-up">
  <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-8">
    <div class="text-5xl mb-4">🗑️</div>
    <h1 class="text-xl font-bold text-slate-800 mb-2">Delete Item?</h1>
    <p class="text-slate-500 text-sm mb-6">
      Are you sure you want to delete <strong>{{ item.title }}</strong>?
      This action cannot be undone.
    </p>
    <form method="post" class="flex gap-3 justify-center">
      {% csrf_token %}
      <button type="submit"
              class="bg-red-500 hover:bg-red-600 text-white font-bold px-6 py-2.5 rounded-xl transition text-sm">
        Yes, Delete
      </button>
      <a href="{% url 'items:detail' item.pk %}"
         class="border border-slate-200 hover:bg-slate-50 text-slate-700 font-semibold px-6 py-2.5 rounded-xl transition text-sm">
        Cancel
      </a>
    </form>
  </div>
</div>
{% endblock %}
